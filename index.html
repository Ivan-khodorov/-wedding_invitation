<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Свадебное приглашение</title>
  <meta name="description" content="Персональная страница свадебного приглашения">
  <link rel="stylesheet" href="css/main.css">
  <link rel="preload" as="font" href="fonts/BDScript-Regular.woff2" type="font/woff2" crossorigin>
  <link rel="preload" as="font" href="fonts/BDScript-Bold.woff2" type="font/woff2" crossorigin>
  <link rel="preload" as="image" href="img/8.png" fetchpriority="high">
  <link rel="preload" as="image" href="img/backgraund.png">
  <link rel="preload" as="video" href="img/fon_video_mobile.mp4" type="video/mp4" media="(max-width: 768px)">
  <link rel="preload" as="video" href="img/fon_video.mp4" type="video/mp4" media="(min-width: 769px)">
</head>
<body>


<main class="invitation" data-scene>
  <section class="hero" aria-label="Свадебное приглашение">
    <video class="hero__video" data-hero-video autoplay muted playsinline preload="auto">
      <source src="img/fon_video_mobile.mp4" type="video/mp4" media="(max-width: 768px)">
      <source src="img/fon_video.mp4" type="video/mp4">
      Ваш браузер не поддерживает воспроизведение видео.
    </video>

    <div class="hero__legacy">
      <div class="hero__names" data-names>
        <p class="hero__name hero__name--first" data-typing-text="Ivan &amp; Ekaterina">Ivan &amp; Ekaterina</p>
        <p class="hero__tagline hero__tagline--second" data-typing-text="are getting married!">are getting married!</p>
      </div>

      <figure class="hero__pair">
        <img src="img/8.png" alt="Фото пары" loading="eager" fetchpriority="high" decoding="async">
      </figure>

<!--      <figure class="hero__cat">-->
<!--        <img src="img/7.png" alt="Фото кота">-->
<!--      </figure>-->

      <div class="hero__date">
        <p>15 августа 2026</p>
      </div>

      <figure class="hero__date-desktop">
        <img src="img/11.png" alt="Дата свадьбы 15 августа 2026">
      </figure>
    </div>
  </section>

  <div class="invitation__after-video">
    <div class="invitation__background" aria-hidden="true">
      <img class="invitation__background-image" src="img/backgraund.png" alt="" loading="eager" decoding="async">
    </div>

    <section class="place" aria-label="Место">
      <div class="place__wedding">
        <p class="place__title">marriage</p>
        <figure class="place__image">
          <img src="img/4.png" alt="Место свадьбы">
        </figure>
      </div>

      <div class="place__arrow" aria-hidden="true">
        <svg class="place__arrow-svg" data-place-arrow-svg viewBox="0 0 100 100" preserveAspectRatio="none">
          <path class="place__arrow-path" data-place-arrow-path d="M 0 0 C 0 0 0 0 0 0"></path>
        </svg>
      </div>

      <figure class="place__arrow-desktop" aria-hidden="true">
        <svg class="place__arrow-desktop-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="500" zoomAndPan="magnify" viewBox="0 0 375 374.999991" height="500" preserveAspectRatio="xMidYMid meet" version="1.0"><path stroke-linecap="butt" transform="matrix(0.216747, -0.717998, 0.717998, 0.216747, 39.727568, 247.691117)" fill="none" stroke-linejoin="miter" d="M 0.504984 1.962502 C 55.135193 16.225913 117.85794 16.224216 188.67473 1.962397 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><path stroke-linecap="butt" transform="matrix(0.672845, -0.331329, 0.331329, 0.672845, 3.369656, 264.978117)" fill="none" stroke-linejoin="miter" d="M 4.618008 1.708596 C -5.015321 28.262678 11.930207 28.264564 55.452219 1.70728 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><path stroke-linecap="butt" transform="matrix(-0.651229, 0.372023, -0.372023, -0.651229, 154.183895, 182.242152)" fill="none" stroke-linejoin="miter" d="M 0.280344 1.977573 C 138.174552 21.602402 213.020479 21.603382 224.825229 1.978576 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><path stroke-linecap="butt" transform="matrix(-0.650059, 0.374063, -0.374063, -0.650059, 274.396335, 122.199902)" fill="none" stroke-linejoin="miter" d="M 0.931665 12.525248 C 27.55947 -1.512654 86.956214 -1.507629 179.122579 12.528696 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><path stroke-linecap="butt" transform="matrix(0.638873, 0.392863, -0.392863, 0.638873, 279.840015, 94.123844)" fill="none" stroke-linejoin="miter" d="M 1.973662 30.533489 C 8.160037 -7.510673 21.677044 -7.513385 42.530139 30.534226 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><path stroke-linecap="butt" transform="matrix(-0.593986, -0.457908, 0.457908, -0.593986, 302.384896, 165.77164)" fill="none" stroke-linejoin="miter" d="M 1.996519 32.220714 C 2.084632 -8.074616 13.740916 -8.070686 36.977745 32.222963 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><path stroke-linecap="butt" transform="matrix(0.749994, 0.00293151, -0.00293151, 0.749994, 314.068606, 128.162701)" fill="none" stroke-linejoin="miter" d="M 1.751558 25.130579 C 18.849903 -5.707324 35.511479 -5.709949 51.731098 25.127933 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/><path stroke-linecap="butt" transform="matrix(-0.747803, -0.0573673, 0.0573673, -0.747803, 374.19789, 157.509014)" fill="none" stroke-linejoin="miter" d="M 1.683459 12.639029 C 10.781327 -1.54634 20.29369 -1.544767 30.220151 12.638554 " stroke="#f2f1eb" stroke-width="4" stroke-opacity="1" stroke-miterlimit="4"/></svg>
      </figure>

      <div class="place__meeting">
        <p class="place__title">gathering</p>
        <figure class="place__image">
          <img src="img/5.png" alt="Место встречи">
        </figure>
      </div>
    </section>

    <section class="details" aria-label="Детали">
      <h2 class="details__title">details</h2>
      <div class="details__content">
      <img class="details__dresscode-rays details__dresscode-rays--left" src="img/3.png" alt="" aria-hidden="true">
      <p class="details__lead">
        Это будет не классическая свадьба, а скорее теплый семейный ужин
      </p>

      <figure class="details__kitten">
        <img src="img/1.png" alt="Котенок">
      </figure>

      <div class="details__dresscode" aria-label="Дресс-код отсутствует">
        <p class="details__dresscode-text">
          Дресс-код
          <span class="details__dresscode-accent">отсутствует</span>
        </p>
      </div>
      <img class="details__dresscode-rays details__dresscode-rays--right" src="img/3.png" alt="" aria-hidden="true">
      </div>
      <div class="details__p_s" >
        <p class="details__postscript">P.S.</p>
        <p class="details__flowers">
          Просим не обременять себя выбором цветов - ваше присутствие скрасит этот день лучше любых букетов
        </p>
      </div>
      <figure class="details__cat">
        <img src="img/2.png" alt="Кот">
      </figure>
    </section>
  </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
